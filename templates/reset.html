<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Painel de Bordo</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-primary: #ffffff;
            --bg-secondary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 3rem 2rem;
            max-width: 450px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.show { display: block; }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
            border-left: 4px solid var(--success);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #7f1d1d;
            border-left: 4px solid var(--danger);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: #1e3a8a;
            border-left: 4px solid var(--primary);
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            display: flex;
            gap: 0.25rem;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .strength-bar.weak { background: var(--danger); }
        .strength-bar.medium { background: var(--warning); }
        .strength-bar.strong { background: var(--success); }

        .return-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .return-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .return-link a:hover {
            text-decoration: underline;
        }

        .success-screen {
            display: none;
            text-align: center;
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success-screen h2 {
            margin-bottom: 0.5rem;
        }

        .success-screen p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULÁRIO -->
        <div id="formScreen">
            <div class="header">
                <h1>🔐 Redefinir Senha</h1>
                <p>Digite sua nova senha</p>
            </div>

            <div id="alert" class="alert"></div>

            <form onsubmit="handleReset(event)">
                <div class="form-group">
                    <label for="password">Nova Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••"
                        minlength="6"
                        required
                        oninput="checkPasswordStrength()"
                    >
                    <div class="password-strength">
                        <div class="strength-bar" id="bar1"></div>
                        <div class="strength-bar" id="bar2"></div>
                        <div class="strength-bar" id="bar3"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Senha</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        placeholder="••••••••"
                        minlength="6"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Redefinir Senha
                </button>
            </form>

            <div class="return-link">
                <a href="/">← Voltar ao login</a>
            </div>
        </div>

        <!-- TELA DE SUCESSO -->
        <div id="successScreen" class="success-screen">
            <div class="success-icon">✅</div>
            <h2>Senha Redefinida!</h2>
            <p>Sua senha foi alterada com sucesso.</p>
            <p>Você será redirecionado para o login em alguns segundos...</p>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let isSubmitting = false;

        // Obter token da URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // Se não tiver token, redirecionar
        if (!token) {
            showAlert('Token inválido ou expirado', 'danger');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            showAlert('Defina sua nova senha abaixo', 'info');
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            let strength = 0;

            // Verifica comprimento
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;

            // Verifica variedade de caracteres
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            // Mostrar barras
            const bars = ['bar1', 'bar2', 'bar3'];
            bars.forEach((bar, index) => {
                const element = document.getElementById(bar);
                element.className = 'strength-bar';
                
                if (strength > index * 1.5) {
                    if (strength <= 2) element.classList.add('weak');
                    else if (strength <= 4) element.classList.add('medium');
                    else element.classList.add('strong');
                }
            });
        }

        async function handleReset(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem', 'danger');
                return;
            }

            if (password.length < 6) {
                showAlert('A senha deve ter pelo menos 6 caracteres', 'danger');
                return;
            }

            if (isSubmitting) return;
            isSubmitting = true;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Aguarde...';

            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ ' + data.message, 'success');
                    
                    // Mostrar tela de sucesso
                    document.getElementById('formScreen').style.display = 'none';
                    document.getElementById('successScreen').style.display = 'block';

                    // Redirecionar para login após 3 segundos
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showAlert(data.error || 'Erro ao redefinir senha', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Redefinir Senha';
                }
            } catch (e) {
                showAlert('Erro de conexão', 'danger');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Redefinir Senha';
            }

            isSubmitting = false;
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
        }
    </script>
</body>
</html>
