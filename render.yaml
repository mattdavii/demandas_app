services:
  - type: web
    name: demandas-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    
databases:
  - name: demandas-db
    databaseName: demandas_db
    user: postgres
